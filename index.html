    function useTilt() {
      const ref = useRef(null);

      useEffect(() => {
        const element = ref.current;
        if (!element) return;

        const handleMouseMove = (event) => {
          const rect = element.getBoundingClientRect();
          const x = (event.clientX - rect.left) / rect.width - 0.5;
          const y = (event.clientY - rect.top) / rect.height - 0.5;
          element.style.transform =
            'perspective(800px) rotateX(' + (-y * 12) + 'deg) rotateY(' + (x * 12) + 'deg) scale3d(1.02, 1.02, 1.02)';
        };

        const handleMouseLeave = () => {
          element.style.transform = 'perspective(800px) rotateX(0) rotateY(0) scale3d(1, 1, 1)';
        };

        element.addEventListener('mousemove', handleMouseMove);
        element.addEventListener('mouseleave', handleMouseLeave);

        return () => {
          element.removeEventListener('mousemove', handleMouseMove);
          element.removeEventListener('mouseleave', handleMouseLeave);
        };
      }, []);

      return ref;
    }

    function Toast({ message, type, onClose }) {
      const [isExiting, setIsExiting] = useState(false);

            </button>
          </div>

      );

    function CustomCursor() {
      const [position, setPosition] = useState({ x: -100, y: -100 });
      const [isVisible, setIsVisible] = useState(false);
      const [isHovering, setIsHovering] = useState(false);

      useEffect(() => {
        const handleMouseMove = (event) => setPosition({ x: event.clientX, y: event.clientY });
        const handleMouseEnter = () => setIsVisible(true);
        const handleMouseLeave = () => setIsVisible(false);

        window.addEventListener('mousemove', handleMouseMove);
        document.addEventListener('mouseenter', handleMouseEnter);
        document.addEventListener('mouseleave', handleMouseLeave);

        const observer = new MutationObserver(() => {
          const interactiveElements = document.querySelectorAll('a, button, input, textarea, [role="button"]');
          interactiveElements.forEach((element) => {
            element.addEventListener('mouseenter', () => setIsHovering(true));
            element.addEventListener('mouseleave', () => setIsHovering(false));
          });
        });

        observer.observe(document.body, { childList: true, subtree: true });

        return () => {
          window.removeEventListener('mousemove', handleMouseMove);
          document.removeEventListener('mouseenter', handleMouseEnter);
          document.removeEventListener('mouseleave', handleMouseLeave);
          observer.disconnect();
        };
      }, []);

      if (window.innerWidth < 768) return null;

      const cursorSize = isHovering ? 'w-10 h-10 bg-brand-lime/20 border-2 border-brand-lime/50' : 'w-4 h-4 bg-brand-lime border border-brand-lime/80';
      const cursorOffset = isHovering ? 20 : 8;
      const cursorStyle = {
        left: position.x - cursorOffset,
        top: position.y - cursorOffset,
        opacity: isVisible ? 1 : 0,
        transform: isVisible ? 'scale(1)' : 'scale(0)'
      };

      const trailStyle = {
        left: position.x - 16,
        top: position.y - 16,
        opacity: isVisible ? 0.3 : 0
      };

      return (
        <React.Fragment>
          <div className={'fixed pointer-events-none z-[99999] rounded-full transition-all duration-100 ' + cursorSize} style={cursorStyle}></div>
          <div className="fixed pointer-events-none z-[99998] w-8 h-8 rounded-full border border-white/20 transition-all duration-300" style={trailStyle}></div>
        </React.Fragment>
      );
    }

    function ScrollProgress() {
      const [progress, setProgress] = useState(0);

      useEffect(() => {
        const handleScroll = () => {
          const scrolled = window.scrollY;
          const totalHeight = document.documentElement.scrollHeight - window.innerHeight;
          setProgress(totalHeight > 0 ? (scrolled / totalHeight) * 100 : 0);
        };

        window.addEventListener('scroll', handleScroll);
        return () => window.removeEventListener('scroll', handleScroll);
      }, []);

      return (
        <div className="fixed top-0 left-0 right-0 z-[60] h-[3px] bg-transparent">
          <div className="h-full bg-brand-lime transition-all duration-150" style={{ width: progress + '%' }}></div>
        </div>
      );
    }

    function BackToTop() {
      const [isVisible, setIsVisible] = useState(false);

      useEffect(() => {
        const handleScroll = () => setIsVisible(window.scrollY > 600);
        window.addEventListener('scroll', handleScroll);
        return () => window.removeEventListener('scroll', handleScroll);
      }, []);

      if (!isVisible) return null;

      return (

        </button>
      );
    }


    /* ==========================================================================

    function TypingText({ texts, speed = 80, deleteSpeed = 40, pause = 2000 }) {
      const [displayText, setDisplayText] = useState('');
      const [textIndex, setTextIndex] = useState(0);
      const [charIndex, setCharIndex] = useState(0);
      const [isDeleting, setIsDeleting] = useState(false);

      useEffect(() => {
        const currentText = texts[textIndex];
        let timer;

        if (!isDeleting && charIndex < currentText.length) {
          timer = setTimeout(() => setDisplayText(currentText.slice(0, charIndex + 1)), speed);
          setCharIndex(charIndex + 1);
        } else if (!isDeleting && charIndex === currentText.length) {
          timer = setTimeout(() => setIsDeleting(true), pause);
        } else if (isDeleting && charIndex > 0) {
          timer = setTimeout(() => {
            setDisplayText(currentText.slice(0, charIndex - 1));
            setCharIndex(charIndex - 1);
          }, deleteSpeed);
        } else if (isDeleting && charIndex === 0) {
          setIsDeleting(false);
          setTextIndex((textIndex + 1) % texts.length);
        }

        return () => clearTimeout(timer);
      }, [charIndex, isDeleting, textIndex, texts, speed, deleteSpeed, pause]);

      return (
        <span>
          {displayText}
          <span className="typing-cursor"></span>
        </span>
      );
    }

    function AnimatedCounter({ end, duration = 2000, suffix = '', prefix = '' }) {
      const [value, setValue] = useState(0);
      const elementRef = useRef(null);
      const hasStarted = useRef(false);

      useEffect(() => {
        const observer = new IntersectionObserver((entries) => {
          if (entries[0].isIntersecting && !hasStarted.current) {
            hasStarted.current = true;
            const startTime = Date.now();

            const animate = () => {
              const elapsed = Math.min((Date.now() - startTime) / duration, 1);
              const easedProgress = 1 - Math.pow(1 - elapsed, 3);
              setValue(Math.floor(easedProgress * end));

              if (elapsed < 1) {
                requestAnimationFrame(animate);
              }
            };

            animate();
          }
        }, { threshold: 0.5 });

        if (elementRef.current) {
          observer.observe(elementRef.current);
        }

        return () => observer.disconnect();
      }, [end, duration]);

      return <span ref={elementRef}>{prefix}{value}{suffix}</span>;
    }

    /* ==========================================================================
       REGISTRATION FORM
       ========================================================================== */

    function RegistrationForm({ onToast }) {
      const [formState, setFormState] = useState({ name: '', email: '', phone: '' });
      const [errors, setErrors] = useState({});
      const [isSubmitting, setIsSubmitting] = useState(false);
      const [isSubmitted, setIsSubmitted] = useState(false);
      const [serverError, setServerError] = useState('');

      const formRef = useRef({ name: '', email: '', phone: '' });

      /* Validation */
      const validateForm = (values) => {
        const validationErrors = {};

        if (!values.name.trim()) {
          validationErrors.name = 'Name is required';
        } else if (values.name.trim().length < 2) {
          validationErrors.name = 'Name must be at least 2 characters';
        }

        if (!values.email.trim()) {
          validationErrors.email = 'Email is required';
        } else if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(values.email)) {
          validationErrors.email = 'Please enter a valid email';
        }

        if (!values.phone.trim()) {
          validationErrors.phone = 'Phone number is required';
        } else if (!/^[6-9]\d{9}$/.test(values.phone.replace(/\s/g, ''))) {
          validationErrors.phone = 'Enter a valid 10-digit Indian phone number';
        }

        return validationErrors;
      };

      /* Handle Input Change */
      const handleInputChange = (field, value) => {
        const updatedForm = Object.assign({}, formRef.current);
        updatedForm[field] = value;
        formRef.current = updatedForm;
        setFormState(updatedForm);
        setServerError('');

        const fieldErrors = validateForm(updatedForm);
        setErrors((prevErrors) => {
          const newErrors = Object.assign({}, prevErrors);
          newErrors[field] = fieldErrors[field] || '';
          return newErrors;
        });
      };

      /* Handle Form Submit */
      const handleSubmit = async (event) => {
        event.preventDefault();

        const currentFormData = formRef.current;
        const validationErrors = validateForm(currentFormData);
        setErrors(validationErrors);
        setServerError('');

        if (Object.keys(validationErrors).length > 0) return;

        setIsSubmitting(true);

        try {
          const response = await fetch(API_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              name: currentFormData.name,
              email: currentFormData.email,
              phone: currentFormData.phone,
              workshop: 'AI and Robotics Summer Workshop',
              ageGroup: '8-14',
              startDate: '2026-07-15'
            })
          });

          const data = await response.json();

          if (!response.ok) {
            if (data.errors && data.errors.length > 0) {
              const fieldErrors = {};
              data.errors.forEach((error) => { fieldErrors[error.field] = error.message; });
              setErrors(fieldErrors);
            }
            throw new Error(data.message || 'Submission failed');
          }

          if (data.success) {
            setIsSubmitted(true);
            onToast('Enquiry submitted! We will reach out within 24 hours.', 'success');
          } else {
            throw new Error(data.message || 'Something went wrong');
          }
        } catch (error) {
          let errorMessage = error.message || 'Something went wrong. Please try again.';
          if (errorMessage === 'Failed to fetch') {
            errorMessage = 'Cannot connect to server. Make sure the API is running on port 3000.';
          }
          setServerError(errorMessage);
          onToast(errorMessage, 'error');
        } finally {
          setIsSubmitting(false);
        }
      };

      /* Check if field has error */
      const hasError = (field) => errors[field];

      /* Success State */
      if (isSubmitted) {
        return (
          <section id="register" className="py-24 lg:py-32 bg-white">
            <div className="max-w-[1600px] mx-auto px-6 lg:px-12">
              <div className="rounded-[32px] bg-gradient-to-br from-brand-lime/10 to-cyan-50/50 border border-brand-lime/20 p-10 lg:p-16 text-center max-w-lg mx-auto animate-fade-up">
                <div className="w-24 h-24 rounded-full bg-brand-lime/20 flex items-center justify-center mx-auto mb-6 animate-bounce-soft">
                  <iconify-icon icon="lucide:party-popper" width="44" height="44" className="text-kidrove-700"></iconify-icon>
                </div>
                <h3 className="font-display font-bold text-3xl text-stone-900 tracking-tight mb-3">You are In!</h3>
                <p className="text-stone-500 text-base leading-relaxed mb-6">
                  Thank you, <span className="font-bold text-stone-800">{formRef.current.name}</span>! We will contact you at <span className="font-bold text-stone-800">{formRef.current.email}</span> within 24 hours.
                </p>
                <div className="p-4 rounded-2xl bg-white/80 border border-stone-200/50 text-sm text-stone-500">
                  <iconify-icon icon="lucide:mail-check" width="16" height="16" style={{ verticalAlign: '-3px', marginRight: '4px' }}></iconify-icon>
                  Check your email for a confirmation receipt.
                </div>
              </div>
            </div>
          </section>
        );
      }

      /* Form State */
      return (
        <section id="register" className="py-24 lg:py-32 bg-white relative">
          <div className="max-w-[1600px] mx-auto px-6 lg:px-12">
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-12 lg:gap-20 items-start">

              {/* Left Column - Info */}
              <div className="sr lg:sticky lg:top-28">
                <div className="inline-flex items-center gap-2 px-4 py-1.5 rounded-full bg-brand-lime/15 text-stone-700 text-[10px] font-bold tracking-[.2em] uppercase mb-6">
                  <iconify-icon icon="lucide:user-plus" width="14" height="14"></iconify-icon>
                  REGISTRATION
                </div>
                <h2 className="font-display font-bold text-3xl sm:text-4xl lg:text-5xl tracking-tight text-stone-900 leading-tight mb-4">
                  Secure Your <span className="text-grad">Spot</span>
                </h2>
                <p className="text-stone-500 text-base leading-relaxed mb-10 max-w-md">
                  Fill in the details and our team will get in touch within 24 hours.
                </p>

                {/* Steps */}
                <div className="space-y-0">
                  {REGISTRATION_STEPS.map((step, index) => (
                    <div key={step.number} className="flex gap-4">
                      <div className="flex flex-col items-center">
                        <div className="w-10 h-10 rounded-xl bg-stone-900 text-brand-lime flex items-center justify-center text-xs font-bold flex-shrink-0">
                          {step.number}
                        </div>
                        {index < REGISTRATION_STEPS.length - 1 && (
                          <div className="w-0.5 h-12 bg-stone-200 my-1"></div>
                        )}
                      </div>
                      <div className="pb-8">
                        <div className="font-display font-semibold text-sm text-stone-900">{step.title}</div>
                        <div className="text-xs text-stone-400 mt-0.5">{step.description}</div>
                      </div>
                    </div>
                  ))}
                </div>
              </div>

              {/* Right Column - Form */}
              <div className="sr">
                <form onSubmit={handleSubmit} noValidate className="rounded-[32px] bg-stone-50/80 border border-stone-200/50 p-8 lg:p-10 space-y-6 shadow-lg shadow-stone-200/30">

                  {/* Server Error */}
                  {serverError && (
                    <div className="p-4 rounded-2xl bg-red-50 border border-red-200 text-sm text-red-600 flex items-start gap-2">
                      <iconify-icon icon="lucide:alert-triangle" width="16" height="16" className="mt-0.5 flex-shrink-0"></iconify-icon>
                      <span>{serverError}</span>
                    </div>
                  )}

                  {/* Name Field */}
                  <div>
                    <label className="block text-sm font-medium text-stone-700 mb-2">
                      Parent/Guardian Name <span className="text-red-400">*</span>
                    </label>
                    <div className="relative">
                      <iconify-icon icon="lucide:user" width="18" height="18" style={{ position: 'absolute', left: '16px', top: '50%', transform: 'translateY(-50%)', color: '#a8a29e', pointerEvents: 'none' }}></iconify-icon>
                      <input
                        type="text"
                        placeholder="Enter your full name"
                        value={formState.name}
                        onChange={(e) => handleInputChange('name', e.target.value)}
                        className={'inp w-full pl-11 pr-4 py-3.5 rounded-xl text-sm text-stone-900 placeholder:text-stone-400 ' + (hasError('name') ? 'err' : '')}
                      />
                    </div>
                    {hasError('name') && (
                      <p className="text-red-500 text-xs mt-1.5 flex items-center gap-1">
                        <iconify-icon icon="lucide:alert-circle" width="12" height="12"></iconify-icon>
                        {errors.name}
                      </p>
                    )}
                  </div>

                  {/* Email Field */}
                  <div>
                    <label className="block text-sm font-medium text-stone-700 mb-2">
                      Email Address <span className="text-red-400">*</span>
                    </label>
                    <div className="relative">
                      <iconify-icon icon="lucide:mail" width="18" height="18" style={{ position: 'absolute', left: '16px', top: '50%', transform: 'translateY(-50%)', color: '#a8a29e', pointerEvents: 'none' }}></iconify-icon>
                      <input
                        type="email"
                        placeholder="you@example.com"
                        value={formState.email}
                        onChange={(e) => handleInputChange('email', e.target.value)}
                        className={'inp w-full pl-11 pr-4 py-3.5 rounded-xl text-sm text-stone-900 placeholder:text-stone-400 ' + (hasError('email') ? 'err' : '')}
                      />
                    </div>
                    {hasError('email') && (
                      <p className="text-red-500 text-xs mt-1.5 flex items-center gap-1">
                        <iconify-icon icon="lucide:alert-circle" width="12" height="12"></iconify-icon>
                        {errors.email}
                      </p>
                    )}
                  </div>

                  {/* Phone Field */}
                  <div>
                    <label className="block text-sm font-medium text-stone-700 mb-2">
                      Phone Number <span className="text-red-400">*</span>
                    </label>
                    <div className="relative">
                      <span style={{ position: 'absolute', left: '16px', top: '50%', transform: 'translateY(-50%)', color: '#78716c', fontSize: '14px', fontWeight: '600', pointerEvents: 'none' }}>+91</span>
                      <input
                        type="tel"
                        placeholder="9876543210"
                        value={formState.phone}
                        onChange={(e) => handleInputChange('phone', e.target.value.replace(/\D/g, '').slice(0, 10))}
                        className={'inp w-full pl-14 pr-4 py-3.5 rounded-xl text-sm text-stone-900 placeholder:text-stone-400 ' + (hasError('phone') ? 'err' : '')}
                      />
                    </div>
                    {hasError('phone') && (
                      <p className="text-red-500 text-xs mt-1.5 flex items-center gap-1">
                        <iconify-icon icon="lucide:alert-circle" width="12" height="12"></iconify-icon>
                        {errors.phone}
                      </p>
                    )}
                  </div>

                  {/* Submit Button */}
                  <button type="submit" disabled={isSubmitting} className="btn-l w-full py-4 rounded-xl text-sm font-bold flex items-center justify-center gap-2 disabled:opacity-60 disabled:cursor-not-allowed">
                    {isSubmitting ? (
                      <React.Fragment>
                        <svg className="animate-spin h-5 w-5" viewBox="0 0 24 24" fill="none">
                          <circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4"></circle>
                          <path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
                        </svg>
                        Submitting...
                      </React.Fragment>
                    ) : (
                      <React.Fragment>
                        Submit Enquiry <iconify-icon icon="lucide:send" width="16" height="16"></iconify-icon>
                      </React.Fragment>
                    )}
                  </button>

                  <p className="text-xs text-stone-400 text-center leading-relaxed">
                    By submitting, you agree to receive communications from Kidrove. We respect your privacy.
                  </p>
                </form>
              </div>
            </div>
          </div>
        </section>
      );
    }

    /* ==========================================================================
       APP
       ========================================================================== */

    function App() {
      const [toasts, setToasts] = useState([]);

      const addToast = useCallback((message, type) => {
        setToasts((previous) => previous.concat([{
          id: Date.now(),
          message: message,
          type: type || 'success'
        }]));
      }, []);

      const removeToast = useCallback((id) => {
        setToasts((previous) => previous.filter((toast) => toast.id !== id));
      }, []);

      /* Scroll Reveal Observer */
      useEffect(() => {
        const observer = new IntersectionObserver((entries) => {
          entries.forEach((entry) => {
            if (entry.isIntersecting) {
              entry.target.classList.add('vis');

              const progressBars = entry.target.querySelectorAll('[data-width]');
              progressBars.forEach((bar) => {
                setTimeout(() => {
                  bar.style.width = bar.getAttribute('data-width');
                }, 300);
              });
            }
          });
        }, { threshold: 0.1, rootMargin: '0px 0px -40px 0px' });

        const scrollRevealElements = document.querySelectorAll('.sr');
        for (let i = 0; i < scrollRevealElements.length; i++) {
          observer.observe(scrollRevealElements[i]);
        }

        return () => observer.disconnect();
      }, []);

      /* Spotlight Effect */
      useEffect(() => {
        const handleMouseMove = (event) => {
          const spotlightCards = document.querySelectorAll('.spot');
          for (let i = 0; i < spotlightCards.length; i++) {
            const card = spotlightCards[i];
            const rect = card.getBoundingClientRect();
            card.style.setProperty('--mx', (event.clientX - rect.left) + 'px');
            card.style.setProperty('--my', (event.clientY - rect.top) + 'px');
          }
        };

        window.addEventListener('mousemove', handleMouseMove);
        return () => window.removeEventListener('mousemove', handleMouseMove);
      }, []);

      return (
        <React.Fragment>
          <CustomCursor />
          <ScrollProgress />
          <Navbar />
          <Hero />
          <TrustMarquee />
          <WorkshopDetails />
          <Curriculum />
          <LearningOutcomes />
          <Testimonials />
          <FAQSection />
          <RegistrationForm onToast={addToast} />
          <CTABanner />
          <Footer />
          <BackToTop />
          {toasts.map((toast) => (
            <Toast
              key={toast.id}
              message={toast.message}
              type={toast.type}
              onClose={() => removeToast(toast.id)}
            />
          ))}
        </React.Fragment>
      );
    }

    /* Mount the App */
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
